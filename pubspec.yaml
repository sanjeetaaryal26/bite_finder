name: birdle
description: "Bite Finder Flutter app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  go_router: ^14.8.1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^8.0.0
  crypto: ^3.0.6
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  light_sensor: ^3.0.2
  local_auth: ^3.0.1
  sensors_plus: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - data/osm/kathmandu_restaurants.json
    - assets/images/
